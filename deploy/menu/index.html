<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XiaoHuiAPI Frontend</title>
    <style>
      :root {
        --bg: #070b16;
        --panel: #111a2e;
        --panel-2: #18243f;
        --line: rgba(148, 163, 184, 0.26);
        --text: #f8fafc;
        --muted: #94a3b8;
        --accent: #22d3ee;
        --accent2: #34d399;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 8% 10%, rgba(34, 211, 238, 0.2) 0%, transparent 35%),
          radial-gradient(circle at 86% 80%, rgba(52, 211, 153, 0.2) 0%, transparent 35%),
          var(--bg);
      }

      .layout {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 280px 1fr;
      }

      .sidebar {
        border-right: 1px solid var(--line);
        padding: 20px 16px;
        background: rgba(17, 26, 46, 0.86);
        backdrop-filter: blur(8px);
      }

      .brand {
        margin: 0;
        font-size: 24px;
      }

      .sub {
        margin: 8px 0 20px;
        color: var(--muted);
        font-size: 13px;
      }

      .nav {
        display: grid;
        gap: 10px;
      }

      .nav a {
        text-decoration: none;
        color: var(--text);
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--panel-2);
        padding: 12px;
        transition: transform .15s ease, border-color .15s ease;
      }

      .nav a:hover {
        transform: translateX(3px);
        border-color: rgba(52, 211, 153, 0.7);
      }

      .k {
        color: var(--muted);
        font-size: 11px;
      }

      .main {
        padding: 28px;
      }

      .hero {
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(17, 26, 46, 0.76);
        padding: 22px;
      }

      .hero h1 {
        margin: 0 0 10px;
        font-size: clamp(24px, 4vw, 36px);
      }

      .hero p {
        margin: 0;
        color: var(--muted);
        line-height: 1.65;
      }

      .cards {
        margin-top: 16px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 12px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(24, 36, 63, 0.78);
        padding: 16px;
      }

      .card h2 {
        margin: 0 0 8px;
        font-size: 18px;
      }

      .card p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
      }

      .btn {
        margin-top: 12px;
        display: inline-flex;
        text-decoration: none;
        color: #082f49;
        font-weight: 700;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        padding: 8px 12px;
        border-radius: 10px;
      }

      .feature {
        margin-top: 16px;
        border: 1px solid rgba(34, 211, 238, 0.5);
        border-radius: 14px;
        background: linear-gradient(120deg, rgba(34, 211, 238, 0.17), rgba(52, 211, 153, 0.16));
        padding: 14px;
      }

      .feature h3 {
        margin: 0 0 6px;
        font-size: 16px;
      }

      .feature p {
        margin: 0;
        color: #dbeafe;
        font-size: 14px;
      }

      code {
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 2px 6px;
      }

      @media (max-width: 900px) {
        .layout { grid-template-columns: 1fr; }
        .sidebar { border-right: 0; border-bottom: 1px solid var(--line); }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h2 class="brand">XiaoHuiAPI 前端</h2>
        <p class="sub">统一入口</p>
        <nav class="nav">
          <a href="./index.html">
            <div>首页</div>
            <div class="k">Frontend Home</div>
          </a>
          <a href="./console.html">
            <div>控制台</div>
            <div class="k">Sidebar Console</div>
          </a>
          <a class="service-link" href="#" data-port="8080" data-public-path="/" data-path="/" target="_blank" rel="noopener noreferrer">
            <div>XiaoHuiAPI 网关</div>
            <div class="k">Gateway · liuloys.top</div>
          </a>
        </nav>
      </aside>

      <main class="main">
        <section class="hero">
          <h1>统一入口首页</h1>
          <p>用于快速访问 XiaoHuiAPI 网关与控制台。</p>

          <div class="feature">
            <h3>XiaoHuiAPI</h3>
            <p>集中管理模型网关、账号与密钥能力。</p>
          </div>

          <div class="cards">
            <article class="card">
              <h2>XiaoHuiAPI 控制台</h2>
              <p>模型网关与账号主控页面。</p>
              <a class="btn service-link" href="#" data-port="8080" data-public-path="/" data-path="/" target="_blank" rel="noopener noreferrer">打开控制台</a>
            </article>
          </div>
        </section>
      </main>
    </div>

    <script>
      (function () {
        var protocol = window.location.protocol || "http:";
        var host = window.location.hostname || "localhost";
        function isLocalHost(value) {
          return value === "localhost" || value === "127.0.0.1" || /^\d{1,3}(\.\d{1,3}){3}$/.test(value);
        }
        function getApexHost(value) {
          var parts = value.split(".");
          if (parts.length < 2) return value;
          return parts.slice(-2).join(".");
        }
        var links = document.querySelectorAll(".service-link");
        links.forEach(function (el) {
          var port = el.getAttribute("data-port");
          var publicPath = el.getAttribute("data-public-path");
          var subdomain = el.getAttribute("data-subdomain");
          var path = el.getAttribute("data-path") || "/";
          if (isLocalHost(host)) {
            el.setAttribute("href", protocol + "//" + host + ":" + port + path);
            return;
          }
          if (publicPath) {
            el.setAttribute("href", protocol + "//" + host + publicPath);
            return;
          }
          var targetHost = getApexHost(host);
          if (subdomain) {
            targetHost = subdomain + "." + targetHost;
          }
          el.setAttribute("href", protocol + "//" + targetHost + path);
        });
      })();
    </script>
  </body>
</html>
