<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sub2API Console</title>
    <style>
      :root {
        --bg: #0a1020;
        --panel: #121c33;
        --line: rgba(148, 163, 184, 0.26);
        --text: #f8fafc;
        --muted: #94a3b8;
        --accent: #22d3ee;
        --accent2: #34d399;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 12% 10%, rgba(34, 211, 238, 0.18) 0%, transparent 35%),
          radial-gradient(circle at 88% 78%, rgba(52, 211, 153, 0.18) 0%, transparent 35%),
          var(--bg);
      }

      .layout {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 280px 1fr;
      }

      .sidebar {
        border-right: 1px solid var(--line);
        padding: 18px 14px;
        background: rgba(18, 28, 51, 0.88);
      }

      .title {
        margin: 0;
        font-size: 22px;
      }

      .sub {
        margin: 8px 0 18px;
        color: var(--muted);
        font-size: 13px;
      }

      .menu {
        display: grid;
        gap: 10px;
      }

      .menu a {
        display: block;
        text-decoration: none;
        color: var(--text);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px;
        background: rgba(24, 36, 63, 0.86);
        transition: transform .15s ease, border-color .15s ease;
      }

      .menu a:hover {
        transform: translateX(3px);
        border-color: rgba(34, 211, 238, 0.75);
      }

      .k { color: var(--muted); font-size: 11px; }

      .main {
        padding: 26px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(18, 28, 51, 0.78);
        padding: 20px;
      }

      .panel h1 {
        margin: 0 0 8px;
        font-size: clamp(23px, 4vw, 34px);
      }

      .panel p {
        margin: 0;
        color: var(--muted);
        line-height: 1.65;
      }

      .grid {
        margin-top: 16px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 12px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(24, 36, 63, 0.78);
        padding: 14px;
      }

      .card h2 {
        margin: 0 0 8px;
        font-size: 17px;
      }

      .card p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
      }

      .btn {
        margin-top: 10px;
        display: inline-flex;
        text-decoration: none;
        color: #082f49;
        font-weight: 700;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        padding: 8px 12px;
        border-radius: 9px;
      }

      @media (max-width: 900px) {
        .layout { grid-template-columns: 1fr; }
        .sidebar { border-right: 0; border-bottom: 1px solid var(--line); }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h2 class="title">控制台</h2>
        <p class="sub">Sub2API 控制台导航</p>
        <nav class="menu">
          <a href="./index.html">
            <div>首页</div>
            <div class="k">Back to Frontend</div>
          </a>
          <a class="service-link" href="#" data-port="8080" data-public-path="/" data-path="/" target="_blank" rel="noopener noreferrer">
            <div>网关控制台</div>
            <div class="k">Sub2API · liuloys.top</div>
          </a>
        </nav>
      </aside>

      <main class="main">
        <section class="panel">
          <h1>Sub2API 控制台入口</h1>
          <p>保留核心网关与账号管理入口。</p>

          <div class="grid">
            <article class="card">
              <h2>Sub2API 控制台</h2>
              <p>账号、网关、密钥等常规管理。</p>
              <a class="btn service-link" href="#" data-port="8080" data-public-path="/" data-path="/" target="_blank" rel="noopener noreferrer">进入</a>
            </article>
          </div>
        </section>
      </main>
    </div>

    <script>
      (function () {
        var protocol = window.location.protocol || "http:";
        var host = window.location.hostname || "localhost";
        function isLocalHost(value) {
          return value === "localhost" || value === "127.0.0.1" || /^\d{1,3}(\.\d{1,3}){3}$/.test(value);
        }
        function getApexHost(value) {
          var parts = value.split(".");
          if (parts.length < 2) return value;
          return parts.slice(-2).join(".");
        }
        var links = document.querySelectorAll(".service-link");
        links.forEach(function (el) {
          var port = el.getAttribute("data-port");
          var publicPath = el.getAttribute("data-public-path");
          var subdomain = el.getAttribute("data-subdomain");
          var path = el.getAttribute("data-path") || "/";
          if (isLocalHost(host)) {
            el.setAttribute("href", protocol + "//" + host + ":" + port + path);
            return;
          }
          if (publicPath) {
            el.setAttribute("href", protocol + "//" + host + publicPath);
            return;
          }
          var targetHost = getApexHost(host);
          if (subdomain) {
            targetHost = subdomain + "." + targetHost;
          }
          el.setAttribute("href", protocol + "//" + targetHost + path);
        });
      })();
    </script>
  </body>
</html>
